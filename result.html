<script>

/* ===== MARKS DATA ===== */
let marksData={
"2026-02-14":{
s:22,m:9,total:40,
question:"",
answer:"https://drive.google.com/"
},
"2026-02-28":{
s:27.5,m:23,total:40,
question:"https://drive.google.com/file/d/1jImdxKCiA8eV6FKXGzd5OS3qtP0USii3/preview",
answer:"https://drive.google.com/"
}
};
let autoClose;
let countdownInterval;
function showSpecialEvents(){

let dates=Object.keys(marksData).sort();
if(dates.length===0) return;

let sArr=[], mArr=[], leaders=[];
let prevLeader=null;
let leaderChanged=false;

dates.forEach(d=>{
let s=(marksData[d].s/marksData[d].total)*100;
let m=(marksData[d].m/marksData[d].total)*100;

sArr.push(s);
mArr.push(m);

let currentLeader=s>m?"Sanjukta":m>s?"Mousam":null;
leaders.push(currentLeader);

if(prevLeader && currentLeader && currentLeader!==prevLeader){
leaderChanged=true;
}
prevLeader=currentLeader;
});

function avg(a){return a.reduce((x,y)=>x+y,0)/a.length;}

let sAvg=avg(sArr);
let mAvg=avg(mArr);
let gap=Math.abs(sAvg-mAvg);

let eventText="";
let title="🎉 বিশেষ অর্জন সনাক্ত হয়েছে";

/* Score Milestone */
function milestone(name,avg){
if(avg>=80) return `🌟 ${name} ৮০% অতিক্রম করেছে — অসাধারণ সাফল্য।`;
if(avg>=70) return `🏆 ${name} ৭০% অতিক্রম করেছে — খুবই শক্ত অবস্থান।`;
if(avg>=60) return `✨ ${name} ৬০% অতিক্রম করেছে — ধারাবাহিক ভালো পারফরম্যান্স।`;
return "";
}

let sMilestone=milestone("Sanjukta",sAvg);
let mMilestone=milestone("Mousam",mAvg);

/* Leader Change */
let leaderText="";
if(leaderChanged){
leaderText="🔄 নেতৃত্ব পরিবর্তন হয়েছে — প্রতিযোগিতা আরও উত্তেজনাপূর্ণ হয়েছে।";
}

/* Gap Explanation */
let gapText=`বর্তমানে দুইজনের গড় নম্বরের পার্থক্য ${gap.toFixed(1)}%। `;

if(gap<5){
gapText+="এটি খুব কাছাকাছি প্রতিযোগিতা নির্দেশ করছে।";
}
else if(gap<15){
gapText+="প্রতিযোগিতা মাঝারি মাত্রার।";
}
else{
gapText+="একজন স্পষ্টভাবে এগিয়ে রয়েছে।";
}

/* Combine */

eventText = `
<div class="event-title">${title}</div>
${sMilestone ? sMilestone+"<br>" : ""}
${mMilestone ? mMilestone+"<br>" : ""}
${leaderText ? leaderText+"<br>" : ""}
${gapText}
`;

/* Show */

let container=document.getElementById("specialEventContainer");
container.innerHTML=`
<div class="special-event">
<div class="event-countdown">৩০ সেকেন্ড</div>
${eventText}
</div>
`;

let seconds=30;

let interval=setInterval(()=>{
seconds--;
let cd=document.querySelector(".event-countdown");
if(cd) cd.innerText=seconds+" সেকেন্ড";
},1000);

setTimeout(()=>{
container.innerHTML="";
clearInterval(interval);
},30000);

}

/* Auto Run On Load */

showSpecialEvents();
function buildInsights(){

let dates=Object.keys(marksData).sort();
if(dates.length===0) return [];

let sArr=[], mArr=[], gaps=[];
let leaderChanges=0;
let prevLeader=null;

dates.forEach(d=>{
let s=(marksData[d].s/marksData[d].total)*100;
let m=(marksData[d].m/marksData[d].total)*100;

sArr.push(s);
mArr.push(m);
gaps.push(Math.abs(s-m));

let leader=s>m?"Sanjukta":m>s?"Mousam":null;
if(prevLeader && leader && leader!==prevLeader){
leaderChanges++;
}
prevLeader=leader;
});

function avg(a){return a.reduce((x,y)=>x+y,0)/a.length;}
function growth(a){
if(a.length<2) return 0;
let g=0;
for(let i=1;i<a.length;i++) g+=(a[i]-a[i-1]);
return g/(a.length-1);
}

/* Comeback */
let comeback="বর্তমানে উল্লেখযোগ্য কামব্যাক দেখা যাচ্ছে না";
if(gaps.length>=2 && gaps[gaps.length-1] < gaps[gaps.length-2]){
comeback="🔥 পার্থক্য কমছে — শক্তিশালী কামব্যাক চলছে";
}
if(growth(mArr) > growth(sArr)){
comeback="⚡ Mousam দ্রুত উন্নতি করছে — দ্রুত ঘুরে দাঁড়াচ্ছে";
}

/* Monthly */
let monthMap={};
dates.forEach(d=>{
let month=d.slice(0,7);
if(!monthMap[month]) monthMap[month]={s:[],m:[]};
monthMap[month].s.push((marksData[d].s/marksData[d].total)*100);
monthMap[month].m.push((marksData[d].m/marksData[d].total)*100);
});

let lastMonth=Object.keys(monthMap).pop();
let monthlyBoxes="";
let monthlyExplain="এই মাসের তথ্য এখনও পর্যাপ্ত নয়";

if(lastMonth){
let sAvg=avg(monthMap[lastMonth].s);
let mAvg=avg(monthMap[lastMonth].m);
monthlyBoxes=`
<span class="mini-box">মাস: ${lastMonth}</span>
<span class="mini-box">পরীক্ষা: ${monthMap[lastMonth].s.length}</span>
<span class="mini-box">Sanjukta: ${sAvg.toFixed(1)}%</span>
<span class="mini-box">Mousam: ${mAvg.toFixed(1)}%</span>
`;
monthlyExplain="এই মাসে কে গড়ে বেশি নম্বর পেয়েছে তা এখানে দেখানো হয়েছে।";
}

/* Leader Change */
let leaderText="বর্তমানে নেতৃত্ব স্থিতিশীল রয়েছে";
if(leaderChanges>0){
leaderText="🔄 নেতৃত্ব পরিবর্তন হয়েছে — প্রতিযোগিতা উত্তেজনাপূর্ণ";
}

/* Psychological */
let psych="পারফরম্যান্স স্থিতিশীল রয়েছে";
if(growth(sArr)>5) psych="Sanjukta আত্মবিশ্বাসের সাথে এগোচ্ছে";
if(growth(mArr)>5) psych="Mousam দ্রুত আত্মবিশ্বাস ফিরে পাচ্ছে";
if(gaps[gaps.length-1]>gaps[gaps.length-2]) psych="পার্থক্য বাড়ছে — চাপ বৃদ্ধি পাচ্ছে";

return[
{
title:"💥 Comeback Indicator",
boxes:`<span class="mini-box">${comeback}</span>`,
explain:"যদি পিছিয়ে থেকেও পার্থক্য কমে, তাহলে এটাকে কামব্যাক ধরা হয়।"
},
{
title:"📅 Monthly Performance Summary",
boxes:monthlyBoxes,
explain:monthlyExplain
},
{
title:"🏆 Leader Movement",
boxes:`<span class="mini-box">${leaderText}</span>`,
explain:"পরীক্ষাগুলোর ভিত্তিতে নেতৃত্ব পরিবর্তন হয়েছে কি না তা এখানে দেখানো হয়েছে।"
},
{
title:"🧠 Psychological Trend Insight",
boxes:`<span class="mini-box">${psych}</span>`,
explain:"নম্বরের ধারাবাহিক পরিবর্তন দেখে মানসিক অবস্থা অনুমান করা হয়েছে।"
}
];
}

/* Auto Slider 10 sec */

function startInsightSlider(){

let insights=buildInsights();
if(insights.length===0) return;

let container=document.getElementById("insightSlider");
let index=0;

function show(){

container.innerHTML="";
let slide=document.createElement("div");
slide.className="insight-slide active";

slide.innerHTML=`
<div class="slide-heading">${insights[index].title}</div>
<div>${insights[index].boxes}</div>
<div class="explain-text">${insights[index].explain}</div>
`;

container.appendChild(slide);
index=(index+1)%insights.length;
}

show();
setInterval(show,10000);
}

startInsightSlider();
function calculateData(){

let dates=Object.keys(marksData).sort();
if(dates.length===0) return null;

let sArr=[], mArr=[], gaps=[];
let sWins=0, mWins=0;

dates.forEach(d=>{
let s=(marksData[d].s/marksData[d].total)*100;
let m=(marksData[d].m/marksData[d].total)*100;

sArr.push(s);
mArr.push(m);

if(s>m) sWins++;
else if(m>s) mWins++;

gaps.push(Math.abs(s-m));
});

function avg(arr){
return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function growth(arr){
if(arr.length<2) return 0;
let totalGrowth=0;
for(let i=1;i<arr.length;i++){
totalGrowth+=(arr[i]-arr[i-1]);
}
return totalGrowth/(arr.length-1);
}

function strength(arr){
if(arr.length<3) return "তথ্য এখনও পর্যাপ্ত নয়";
let overall=avg(arr);
let last3=avg(arr.slice(-3));
if(last3>overall) return "সাম্প্রতিক পরীক্ষাগুলোতে আগের তুলনায় ভালো করছে";
if(last3<overall) return "সাম্প্রতিক পরীক্ষাগুলোতে কিছুটা দুর্বল হয়েছে";
return "স্থিতিশীল পারফরম্যান্স বজায় রেখেছে";
}

function intensity(g){
if(g<5) return "খুবই প্রতিদ্বন্দ্বিতাপূর্ণ প্রতিযোগিতা চলছে";
if(g<15) return "মাঝারি মাত্রার প্রতিযোগিতা চলছে";
return "বর্তমানে একজন স্পষ্টভাবে এগিয়ে আছে";
}

function tier(v){
if(v>=85) return "Elite (অসাধারণ)";
if(v>=70) return "Excellent (খুব ভালো)";
if(v>=60) return "Strong (ভালো অবস্থানে)";
if(v>=50) return "Developing (উন্নতির পথে)";
return "Needs Focus (আরও মনোযোগ প্রয়োজন)";
}

return{
total:dates.length,
sWins,
mWins,
avgGap:avg(gaps),
gapTrend:gaps.length>=2?
(gaps[gaps.length-1]>gaps[gaps.length-2]?"নম্বরের পার্থক্য বাড়ছে":"নম্বরের পার্থক্য কমছে"):"স্থিতিশীল",
sGrowth:growth(sArr),
mGrowth:growth(mArr),
sAvg:avg(sArr),
mAvg:avg(mArr),
sStrength:strength(sArr),
mStrength:strength(mArr),
competition:intensity(avg(gaps)),
sTier:tier(avg(sArr)),
mTier:tier(avg(mArr))
};
}

function showAnalysis(type){

let data=calculateData();
if(!data) return;

clearTimeout(autoClose);
clearInterval(countdownInterval);

let seconds=15;

let content="";

if(type==="leader"){
content=`
<div class="analysis-title">🏆 লিডারবোর্ড বিশ্লেষণ</div>
<div class="analysis-text">মোট পরীক্ষা হয়েছে <span class="number-box">${data.total}</span> টি।</div>
<div class="analysis-text">Sanjukta এগিয়ে রয়েছে <span class="number-box">${data.sWins}</span> বার।</div>
<div class="analysis-text">Mousam এগিয়ে রয়েছে <span class="number-box">${data.mWins}</span> বার।</div>
<div class="analysis-text">এখানে দেখানো হচ্ছে কে কতবার বেশি নম্বর পেয়েছে।</div>
`;
}

if(type==="growth"){
content=`
<div class="analysis-title">📈 প্রতি পরীক্ষায় গড় নম্বর বৃদ্ধি</div>
<div class="analysis-text">
Sanjukta প্রতি পরীক্ষায় গড়ে <span class="number-box">${data.sGrowth.toFixed(1)}%</span> নম্বর বৃদ্ধি করছে।
</div>
<div class="analysis-text">
Mousam প্রতি পরীক্ষায় গড়ে <span class="number-box">${data.mGrowth.toFixed(1)}%</span> নম্বর বৃদ্ধি করছে।
</div>
<div class="analysis-text">
এর অর্থ: আগের পরীক্ষার তুলনায় পরবর্তী পরীক্ষায় কত শতাংশ নম্বর বাড়ছে বা কমছে তা এখানে বোঝানো হয়েছে।
</div>
`;
}

if(type==="gap"){

function formatDate(date){
let y=date.getFullYear();
let m=(date.getMonth()+1).toString().padStart(2,"0");
let d=date.getDate().toString().padStart(2,"0");
return `${y}-${m}-${d}`;
}

function generateExams(){
let exams=[];
for(let month=2;month<=5;month++){
let d=new Date(2026,month-1,1);
let sats=[];
while(d.getMonth()==month-1){
if(d.getDay()==6)sats.push(new Date(d));
d.setDate(d.getDate()+1);
}
if(sats[1])exams.push({date:sats[1],total:40});
if(sats[sats.length-1])exams.push({date:sats[sats.length-1],total:40});
}
let d=new Date(2026,4,30);
while(d<=new Date(2026,7,29)){
if(d.getDay()==6)exams.push({date:new Date(d),total:60});
d.setDate(d.getDate()+1);
}
return exams;
}

let exams=generateExams();

let dateStr=formatDate(exam.date);

bestM=Math.max(bestM,mPer);

count++;

let changeM=prevM!==null?(mPer-prevM):0;

/* TIMER */
function startTimer(target,id){
function update(){
let diff=target-new Date();
if(diff<=0){
document.getElementById(id).innerHTML="";
return;
}
let d=Math.floor(diff/(1000*60*60*24));
let h=Math.floor((diff/(1000*60*60))%24);
let m=Math.floor((diff/(1000*60))%60);
document.getElementById(id).innerHTML=
`${d} দিন ${h} ঘন্টা ${m} মিনিট`;
}
setInterval(update,60000);
update();
}

/* ANIMATED COUNT */
document.querySelectorAll(".count").forEach(el=>{
let target=parseFloat(el.dataset.value);
let start=0;
let duration=1000;
let step=target/(duration/20);
let interval=setInterval(()=>{
start+=step;
if(start>=target){
start=target;
clearInterval(interval);
}
el.innerText=start.toFixed(1)+"%";
},20);
});
