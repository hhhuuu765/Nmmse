function getSecondSaturday(year, month){
let date = new Date(year, month, 1);
let count = 0;
while(date.getMonth() === month){
if(date.getDay() === 6){
count++;
if(count === 2) return new Date(date);
}
date.setDate(date.getDate()+1);
}
}

function getLastSaturday(year, month){
let date = new Date(year, month+1, 0);
while(date.getDay() !== 6){
date.setDate(date.getDate()-1);
}
return date;
}

function formatDate(date){
return date.toISOString().split('T')[0];
}

let calendar = document.getElementById("calendar");
let today = new Date();
let upcomingDate = null;

function addExam(date){
let formatted = formatDate(date);
let display = date.toDateString();

let syllabus = syllabusData[formatted] || {en:"Syllabus Not Added Yet",bn:"সিলেবাস এখনো যোগ করা হয়নি"};

let card = document.createElement("div");
card.className="card";

if(date < today){
card.classList.add("done-card");
card.innerHTML = `<div class="done-label">Done</div>`;
}

card.innerHTML += `
<h3>${display}</h3>
<div class="syllabus" data-en="${syllabus.en}" data-bn="${syllabus.bn}">
${syllabus.en}
</div>
<button class="translate-btn" onclick="toggleLang(this)">বাংলা</button>
`;

calendar.appendChild(card);

if(date >= today && !upcomingDate){
upcomingDate = date;
document.getElementById("upcomingContent").innerHTML =
"<b>"+display+"</b><br>"+syllabus.en;
}
}

for(let m=1; m<=4; m++){
addExam(getSecondSaturday(2026,m));
addExam(getLastSaturday(2026,m));
}

for(let m=5; m<=7; m++){
let date = new Date(2026,m,1);
while(date.getMonth()===m){
if(date.getDay()===6) addExam(new Date(date));
date.setDate(date.getDate()+1);
}
}

function updateCountdown(){
if(!upcomingDate) return;

let now = new Date().getTime();
let distance = upcomingDate.getTime() - now;

if(distance < 0){
document.querySelector(".badge").innerText="Done";
document.querySelector(".badge").style.background="#2e7d32";
document.getElementById("countdown").innerText="Exam Completed";
return;
}
/* ===== SIMPLE FONT COLOR CHANGE ONLY ===== */

function simpleTodayColor(){

if(!upcomingDate) return;

let now = new Date();
let examDate = new Date(upcomingDate);
examDate.setHours(17,0,0,0);

let distance = examDate - now;
let days = Math.floor(distance/(1000*60*60*24));

let countdownBox = document.getElementById("countdown");
let badge = document.querySelector(".badge");

/* Today logic */
if(days === 0){
badge.innerText = "Today";
badge.style.background = "orange";
countdownBox.style.color = "#f44336"; // red font
}

/* Day based font colour only */

else if(days === 1){
countdownBox.style.color = "#e91e63"; // pink
}
else if(days === 2){
countdownBox.style.color = "#9c27b0"; // violet
}
else if(days === 3){
countdownBox.style.color = "#ffeb3b"; // yellow
}
else if(days === 4){
countdownBox.style.color = "#ff9800"; // orange
}
else if(days === 5){
countdownBox.style.color = "#4caf50"; // green
}
else if(days === 6){
countdownBox.style.color = "#2196f3"; // blue
}
else if(days >= 7){
countdownBox.style.color = "#ffffff"; // white
}

}

setInterval(simpleTodayColor,1000);
simpleTodayColor();

function toggleLang(btn){
let syllabus = btn.previousElementSibling;
if(btn.innerText==="বাংলা"){
syllabus.innerText = syllabus.getAttribute("data-bn");
btn.innerText="English";
}else{
syllabus.innerText = syllabus.getAttribute("data-en");
btn.innerText="বাংলা";
}
}

/* ===== 24H ALERT MODE ===== */

function check24hAlert(){

if(!upcomingDate) return;

let now = new Date();
let examDate = new Date(upcomingDate);
examDate.setHours(17,0,0,0);

let diff = examDate - now;
let countdownBox = document.getElementById("countdown");

// 24 ঘণ্টা = 86400000 ms
if(diff <= 86400000 && diff > 0){
countdownBox.classList.add("alert-24h");
}else{
countdownBox.classList.remove("alert-24h");
}

}

setInterval(check24hAlert,1000);
check24hAlert();
